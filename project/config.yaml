{} # пустой конфиг — все дефолты заданы в коде
# Чтобы переопределить настройки: закомментируйте первую строку и раскомментируйте нужные параметры ниже.

# =============================================================================
# doc-analyzer — файл конфигурации
#
# Все параметры имеют дефолтные значения в коде. Этот файл позволяет
# переопределить любой из них без изменения исходников.
# Приоритет: значение из этого файла > дефолт в коде.
# =============================================================================


# -----------------------------------------------------------------------------
# Директории для сканирования
# Можно указать одну или несколько. Если список пустой — пути задаются через
# аргументы командной строки (python main.py /path/to/dir) или веб-интерфейс.
# -----------------------------------------------------------------------------

# scan_paths:
#   - "/path/to/folder"
#   - "/another/folder"


# -----------------------------------------------------------------------------
# Обработка изображений
#
# process_standalone_images — распространяется на отдельные файлы-изображения:
#   .jpg .jpeg .png .webp .tiff
#   false — файлы пропускаются, в базу пишутся только метаданные (путь, размер)
#
# process_embedded_images — распространяется на изображения внутри PDF-файлов
#   false — PDF обрабатывается только через Docling (текст), картинки игнорируются
#
# Оба флага независимы — можно включать и выключать по отдельности.
# Управляются также через веб-интерфейс при запуске сканирования.
# -----------------------------------------------------------------------------

# process_standalone_images: true
# process_embedded_images: true


# -----------------------------------------------------------------------------
# Настройки Ollama (локальный LLM-сервер)
#
# base_url — адрес Ollama. Менять если Ollama запущена на нестандартном порту
#   или на другой машине в локальной сети.
#
# model_name — модель для анализа. Выбирается также через веб-интерфейс.
#   qwen3-vl:8b  (~6.1 GB) — основная, мультимодальная, OCR + описание сцены
#   gemma3:4b    (~3.3 GB) — резерв для слабого железа, хуже по OCR
#
# timeout — максимальное время ожидания ответа модели в секундах.
#   Увеличить если модель работает медленно и запросы обрываются по таймауту.
# -----------------------------------------------------------------------------

# ollama:
#   base_url: "http://localhost:11434"
#   model_name: "qwen3-vl:8b"
#   timeout: 3600


# -----------------------------------------------------------------------------
# Нарезка текста на чанки
#
# Текст каждого документа делится на перекрывающиеся фрагменты перед отправкой
# в модель — это позволяет обрабатывать большие файлы и не терять контекст
# на границах фрагментов.
#
# min_size — минимальный размер чанка в символах.
#   Короткие блоки (заголовки, подписи) объединяются до достижения этого порога.
#
# max_size — максимальный размер чанка в символах.
#   Блоки длиннее этого значения разбиваются принудительно.
#
# overlap — перекрытие между соседними чанками в символах.
#   Хвост предыдущего чанка добавляется в начало следующего — чтобы смысл
#   не обрывался на границе фрагмента.
# -----------------------------------------------------------------------------

# chunking:
#   min_size: 3000
#   max_size: 6000
#   overlap: 300


# -----------------------------------------------------------------------------
# База данных SQLite
#
# path — путь к файлу базы данных. Относительный путь отсчитывается от папки
#   с main.py. Изменить если нужно хранить базу в другом месте.
# -----------------------------------------------------------------------------

# database:
#   path: "data/index.db"


# -----------------------------------------------------------------------------
# Логирование
#
# log_dir — папка для лог-файлов. Каждый запуск создаёт отдельный файл
#   вида run_YYYYMMDD_HHMMSS.log с полным DEBUG-выводом.
#
# status_file — JSON-файл текущего прогресса. Перезаписывается после каждого
#   обработанного файла. Читается веб-интерфейсом через GET /api/status.
#   Формат: { total_found, processed, skipped, errors, current_file }
#
# summary_interval — как часто выводить сводку в консоль (каждые N файлов).
# -----------------------------------------------------------------------------

# logging:
#   log_dir: "data/logs"
#   status_file: "data/logs/status.json"
#   summary_interval: 100
